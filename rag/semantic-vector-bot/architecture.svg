<svg width="900" height="640" viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="blG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="inG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="oG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="colL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="colR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <filter id="sh" x="-3%" y="-5%" width="106%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.15"/>
    </filter>
    <filter id="colSh" x="-3%" y="-2%" width="106%" height="106%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#93c5fd" flood-opacity="0.2"/>
    </filter>
    <filter id="colShR" x="-3%" y="-2%" width="106%" height="106%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#c4b5fd" flood-opacity="0.2"/>
    </filter>
    <marker id="mB" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,2 L10,6 L0,10Z" fill="#3b82f6"/>
    </marker>
    <marker id="mI" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,2 L10,6 L0,10Z" fill="#7c3aed"/>
    </marker>
    <marker id="mO" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,2 L10,6 L0,10Z" fill="#d97706"/>
    </marker>
    <marker id="mBridge" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,2 L10,6 L0,10Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" rx="16" fill="url(#bgG)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <rect width="900" height="68" rx="16" fill="white"/>
  <rect y="52" width="900" height="16" fill="white"/>
  <text x="450" y="30" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="21" font-weight="700" fill="#0f172a">Semantic Vector Bot</text>
  <text x="450" y="52" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">Architecture and Data Flow · Local embeddings + Gemini Flash</text>

  <!-- LEFT COLUMN background -->
  <rect x="16" y="74" width="415" height="506" rx="14" fill="url(#colL)" stroke="#93c5fd" stroke-width="1.5" filter="url(#colSh)"/>

  <!-- LEFT COLUMN HEADER -->
  <rect x="16" y="74" width="415" height="36" rx="14" fill="#3b82f6"/>
  <rect x="16" y="95" width="415" height="15" fill="#3b82f6"/>
  <text x="224" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.2">INDEXING  ·  RUNS ONCE PER DOCUMENT</text>

  <!-- LEFT Step 1 -->
  <rect x="28" y="120" width="391" height="50" rx="9" fill="url(#blG)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="58" cy="145" r="13" fill="#3b82f6"/>
  <text x="58" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">1</text>
  <text x="82" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Upload PDF, extract text</text>
  <text x="82" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1d4ed8">pypdf reads all pages</text>

  <!-- Arrow L1 to L2 (30px gap) -->
  <line x1="224" y1="171" x2="224" y2="197" stroke="#3b82f6" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mB)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT Step 2 -->
  <rect x="28" y="200" width="391" height="50" rx="9" fill="url(#blG)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="58" cy="225" r="13" fill="#3b82f6"/>
  <text x="58" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">2</text>
  <text x="82" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Split into overlapping chunks</text>
  <text x="82" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1d4ed8">1500 chars each, 150 char overlap</text>

  <!-- Arrow L2 to L3 -->
  <line x1="224" y1="251" x2="224" y2="277" stroke="#3b82f6" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mB)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT Step 3 (pulsing: local embed highlight) -->
  <rect x="28" y="280" width="391" height="50" rx="9" fill="url(#blG)" stroke="#2563eb" stroke-width="2" filter="url(#sh)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="58" cy="305" r="13" fill="#2563eb"/>
  <text x="58" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="82" y="301" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Embed each chunk locally</text>
  <text x="82" y="318" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1d4ed8">all-MiniLM-L6-v2 via ONNX on CPU, no API</text>

  <!-- Arrow L3 to L4 -->
  <line x1="224" y1="331" x2="224" y2="357" stroke="#3b82f6" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mB)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT Step 4 -->
  <rect x="28" y="360" width="391" height="50" rx="9" fill="url(#blG)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="58" cy="385" r="13" fill="#3b82f6"/>
  <text x="58" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">4</text>
  <text x="82" y="381" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Store vectors in ChromaDB on disk</text>
  <text x="82" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1d4ed8">Persists between restarts, no re-upload needed</text>

  <!-- Arrow L4 to L5 -->
  <line x1="224" y1="411" x2="224" y2="437" stroke="#3b82f6" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mB)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT Step 5 -->
  <rect x="28" y="440" width="391" height="50" rx="9" fill="url(#blG)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="58" cy="465" r="13" fill="#3b82f6"/>
  <text x="58" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">5</text>
  <text x="82" y="461" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Index ready</text>
  <text x="82" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1d4ed8">Vectors saved, waiting for your questions</text>

  <!-- BRIDGE ARROW (left to right) -->
  <path d="M 431 325 L 449 325 L 449 325 L 467 325" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#mBridge)" stroke-dasharray="8 5">
    <animate attributeName="stroke-dashoffset" from="13" to="0" dur="0.5s" repeatCount="indefinite"/>
  </path>
  <text x="450" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#6366f1">Ask</text>

  <!-- RIGHT COLUMN background -->
  <rect x="469" y="74" width="415" height="506" rx="14" fill="url(#colR)" stroke="#c4b5fd" stroke-width="1.5" filter="url(#colShR)"/>

  <!-- RIGHT COLUMN HEADER -->
  <rect x="469" y="74" width="415" height="36" rx="14" fill="#7c3aed"/>
  <rect x="469" y="95" width="415" height="15" fill="#7c3aed"/>
  <text x="677" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.2">ANSWERING  ·  RUNS PER QUESTION</text>

  <!-- RIGHT Step 1 -->
  <rect x="481" y="120" width="391" height="50" rx="9" fill="url(#inG)" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="511" cy="145" r="13" fill="#7c3aed"/>
  <text x="511" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">1</text>
  <text x="535" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3b0764">You ask a question</text>
  <text x="535" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6d28d9">Typed into the chat interface</text>

  <!-- Arrow R1 to R2 -->
  <line x1="677" y1="171" x2="677" y2="197" stroke="#7c3aed" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mI)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT Step 2 (pulsing: local embed) -->
  <rect x="481" y="200" width="391" height="50" rx="9" fill="url(#inG)" stroke="#7c3aed" stroke-width="2" filter="url(#sh)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="511" cy="225" r="13" fill="#7c3aed"/>
  <text x="511" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">2</text>
  <text x="535" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3b0764">Embed question locally</text>
  <text x="535" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6d28d9">Same all-MiniLM-L6-v2 model, no API call</text>

  <!-- Arrow R2 to R3 -->
  <line x1="677" y1="251" x2="677" y2="277" stroke="#7c3aed" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mI)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT Step 3 -->
  <rect x="481" y="280" width="391" height="50" rx="9" fill="url(#inG)" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="511" cy="305" r="13" fill="#7c3aed"/>
  <text x="511" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="535" y="301" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3b0764">Cosine similarity search</text>
  <text x="535" y="318" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6d28d9">ChromaDB finds top 5 chunks by meaning</text>

  <!-- Arrow R3 to R4 -->
  <line x1="677" y1="331" x2="677" y2="357" stroke="#7c3aed" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mI)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT Step 4 -->
  <rect x="481" y="360" width="391" height="50" rx="9" fill="url(#inG)" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="511" cy="385" r="13" fill="#7c3aed"/>
  <text x="511" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">4</text>
  <text x="535" y="381" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3b0764">Build context prompt from chunks</text>
  <text x="535" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6d28d9">Chunks injected into system instruction</text>

  <!-- Arrow R4 to R5 (orange: switches to API) -->
  <line x1="677" y1="411" x2="677" y2="437" stroke="#d97706" stroke-width="3.5" stroke-dasharray="10 6" marker-end="url(#mO)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.4s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT Step 5 (API pulsing orange) -->
  <rect x="481" y="440" width="391" height="50" rx="9" fill="url(#oG)" stroke="#f59e0b" stroke-width="2.5" filter="url(#sh)">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </rect>
  <circle cx="511" cy="465" r="13" fill="#d97706"/>
  <text x="511" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">5</text>
  <text x="535" y="461" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#78350f">Gemini Flash, answer streamed back</text>
  <text x="535" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e">API call, free tier, sources cited at end</text>

  <!-- Legend -->
  <rect x="16" y="592" width="868" height="34" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="74" cy="609" r="6" fill="#3b82f6"/>
  <text x="86" y="613" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Indexing: local CPU</text>
  <circle cx="218" cy="609" r="6" fill="#7c3aed"/>
  <text x="230" y="613" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Retrieval: local CPU</text>
  <circle cx="362" cy="609" r="6" fill="#2563eb"/>
  <text x="374" y="613" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Embedding: local ONNX (90MB, one-time)</text>
  <circle cx="620" cy="609" r="6" fill="#d97706"/>
  <text x="632" y="613" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Generation: Google Gemini API</text>
</svg>
